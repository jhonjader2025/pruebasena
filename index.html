<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Página de Bienvenida</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        h1 {
            font-size: 3em;
            margin: 0;
        }

        p {
            font-size: 1.2em;
        }

        .boton {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #fff;
            color: #4facfe;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .boton:hover {
            background-color: #4facfe;
            color: #fff;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <header>
        <h1>¡Bienvenido a mi página!</h1>
    </header>
    <main>
        <p>Gracias por visitar este sitio. Aquí encontrarás proyectos y recursos interesantes.</p>
        <a href="#" class="boton">Explorar</a>
    </main>
    <footer>
        <p>© 2026 - Creado por Jhon</p>
    </footer>
</body>

</html>
